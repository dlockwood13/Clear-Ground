<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
<meta name="theme-color" content="#0f766e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Clear Ground" />
<title>Clear Ground</title>

<style>
  :root {
    --bg:#f4f3ef; --surface:#ffffff; --surface-2:#faf9f5; --surface-3:#f0efe9;
    --border:#e8e6df; --border-strong:#d9d6cc;
    --text:#1e293b; --text-soft:#64748b; --text-faint:#9aa3b2;
    --accent:#0f766e; --accent-2:#0d9488; --accent-ink:#0f766e;
    --accent-soft:#effaf8;
    --good:#059669; --good-bg:#ecfdf5; --good-bd:#a7f3d0;
    --warn:#d97706; --warn-bg:#fffbeb; --warn-bd:#fde68a;
    --bad:#e11d48; --bad-bg:#fff1f3; --bad-bd:#fecdd6;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 4px 16px rgba(16,24,40,.05);
    --shadow-lg:0 8px 30px rgba(16,24,40,.10);
    --nav-h:64px;
    --r:16px;
  }
  html[data-theme="dark"] {
    --bg:#0e1513; --surface:#16211e; --surface-2:#1a2623; --surface-3:#202d29;
    --border:#283531; --border-strong:#33433e;
    --text:#e8edeb; --text-soft:#9fada9; --text-faint:#6f7c78;
    --accent:#2dd4bf; --accent-2:#5eead4; --accent-ink:#5eead4;
    --accent-soft:rgba(45,212,191,.10);
    --good:#34d399; --good-bg:rgba(52,211,153,.10); --good-bd:rgba(52,211,153,.30);
    --warn:#fbbf24; --warn-bg:rgba(251,191,36,.10); --warn-bd:rgba(251,191,36,.30);
    --bad:#fb7185; --bad-bg:rgba(251,113,133,.10); --bad-bd:rgba(251,113,133,.30);
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.3);
    --shadow-lg:0 8px 30px rgba(0,0,0,.45);
  }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme]) {
      --bg:#0e1513; --surface:#16211e; --surface-2:#1a2623; --surface-3:#202d29;
      --border:#283531; --border-strong:#33433e;
      --text:#e8edeb; --text-soft:#9fada9; --text-faint:#6f7c78;
      --accent:#2dd4bf; --accent-2:#5eead4; --accent-ink:#5eead4;
      --accent-soft:rgba(45,212,191,.10);
      --good:#34d399; --good-bg:rgba(52,211,153,.10); --good-bd:rgba(52,211,153,.30);
      --warn:#fbbf24; --warn-bg:rgba(251,191,36,.10); --warn-bd:rgba(251,191,36,.30);
      --bad:#fb7185; --bad-bg:rgba(251,113,133,.10); --bad-bd:rgba(251,113,133,.30);
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.3);
      --shadow-lg:0 8px 30px rgba(0,0,0,.45);
    }
  }

  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.5;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overscroll-behavior-y:none;
  }
  button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input,textarea { font-family:inherit; font-size:15px; }
  a { color:var(--accent-ink); }
  svg { display:block; }
  ::selection { background:var(--accent-soft); }

  /* ---- App shell ---- */
  .app { max-width:560px; margin:0 auto; min-height:100vh; min-height:100dvh; position:relative; }

  .topbar {
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; gap:10px;
    padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
    background:color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter:saturate(160%) blur(12px);
    -webkit-backdrop-filter:saturate(160%) blur(12px);
    border-bottom:1px solid color-mix(in srgb, var(--border) 60%, transparent);
  }
  .logo {
    width:34px; height:34px; border-radius:11px; flex:none;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:grid; place-items:center; color:#fff;
    box-shadow:0 2px 8px color-mix(in srgb, var(--accent) 40%, transparent);
  }
  html[data-theme="dark"] .logo { color:#06231f; }
  .brand h1 { font-size:16px; font-weight:650; margin:0; letter-spacing:-.01em; }
  .brand p { font-size:11px; color:var(--text-faint); margin:0; }
  .topbar .sp { flex:1; }
  .iconbtn {
    width:38px; height:38px; border-radius:11px; display:grid; place-items:center;
    color:var(--text-soft); background:var(--surface); border:1px solid var(--border);
    transition:transform .15s, background .15s;
  }
  .iconbtn:active { transform:scale(.92); }

  /* ---- Content ---- */
  main { padding:16px 18px calc(var(--nav-h) + env(safe-area-inset-bottom) + 28px); }
  .view { animation:fade .32s ease; }
  @keyframes fade { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce) { .view { animation:none; } * { transition:none !important; } }

  .h2 { font-size:20px; font-weight:680; letter-spacing:-.02em; margin:2px 0 4px; }
  .sub { color:var(--text-soft); font-size:14px; margin:0 0 16px; }

  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
    padding:16px; box-shadow:var(--shadow);
  }
  .card + .card { margin-top:12px; }
  .stack > * + * { margin-top:12px; }

  .hero {
    border-radius:22px; padding:22px;
    background:linear-gradient(140deg,var(--accent),var(--accent-2));
    color:#eafdfb; box-shadow:var(--shadow-lg);
  }
  html[data-theme="dark"] .hero { color:#04211d; }
  .hero h2 { margin:0 0 6px; font-size:19px; font-weight:680; letter-spacing:-.01em; }
  .hero p { margin:0; font-size:14px; opacity:.92; line-height:1.55; }

  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
  .tile {
    text-align:left; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--r); padding:15px; box-shadow:var(--shadow);
    transition:transform .15s, border-color .15s; display:flex; flex-direction:column; gap:6px;
  }
  .tile:active { transform:scale(.97); }
  .tile .tt { display:flex; align-items:center; gap:8px; }
  .tile .tt b { font-size:14.5px; font-weight:620; }
  .tile small { color:var(--text-soft); font-size:12.5px; line-height:1.45; }
  .chip-i { width:30px; height:30px; border-radius:9px; background:var(--accent-soft); color:var(--accent-ink); display:grid; place-items:center; flex:none; }

  .note {
    display:flex; gap:10px; align-items:flex-start;
    border-radius:14px; padding:13px 14px; font-size:12.5px; line-height:1.5;
  }
  .note.info { background:var(--surface-2); border:1px solid var(--border); color:var(--text-soft); }
  .note.good { background:var(--good-bg); border:1px solid var(--good-bd); color:var(--good); }
  .note.warn { background:var(--warn-bg); border:1px solid var(--warn-bd); color:var(--warn); }
  .note.bad  { background:var(--bad-bg);  border:1px solid var(--bad-bd);  color:var(--bad); }
  .note svg { flex:none; margin-top:1px; }
  .note b { font-weight:640; }

  /* ---- Segmented control ---- */
  .seg { display:flex; gap:4px; background:var(--surface-3); border:1px solid var(--border); padding:4px; border-radius:13px; margin-bottom:16px; }
  .seg button { flex:1; padding:8px 4px; border-radius:9px; font-size:13.5px; font-weight:560; color:var(--text-soft); transition:all .18s; }
  .seg button.on { background:var(--surface); color:var(--text); box-shadow:var(--shadow); }

  /* ---- Buttons ---- */
  .btn {
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    padding:13px; border-radius:14px; font-size:15px; font-weight:600;
    background:var(--accent); color:#fff; transition:transform .15s, opacity .15s;
    box-shadow:0 4px 14px color-mix(in srgb, var(--accent) 28%, transparent);
  }
  html[data-theme="dark"] .btn { color:#04211d; }
  .btn:active { transform:scale(.98); }
  .btn:disabled { background:var(--surface-3); color:var(--text-faint); box-shadow:none; cursor:not-allowed; }
  .btn.ghost { background:var(--surface); color:var(--text-soft); border:1px solid var(--border-strong); box-shadow:none; }
  .btn.sm { padding:11px; font-size:14px; }

  /* ---- Progress ---- */
  .prog { height:6px; background:var(--surface-3); border-radius:99px; overflow:hidden; }
  .prog > i { display:block; height:100%; background:var(--accent); border-radius:99px; transition:width .4s cubic-bezier(.4,0,.2,1); }

  /* ---- Assessment ---- */
  .qcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:15px; box-shadow:var(--shadow); }
  .qcard + .qcard { margin-top:10px; }
  .qtext { font-size:14px; margin:0 0 11px; }
  .scale { display:flex; gap:5px; }
  .scale button {
    flex:1; padding:9px 2px; border-radius:10px; font-size:9.5px; line-height:1.15; font-weight:560;
    background:var(--surface-2); color:var(--text-faint); border:1px solid var(--border);
    transition:all .15s;
  }
  .scale button:active { transform:scale(.94); }
  .scale button.on { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 3px 10px color-mix(in srgb,var(--accent) 30%,transparent); }
  html[data-theme="dark"] .scale button.on { color:#04211d; }
  .fwhead { margin:18px 0 10px; }
  .fwhead b { font-size:14.5px; font-weight:640; }
  .fwhead small { display:block; color:var(--text-faint); font-size:11.5px; margin-top:1px; }
  .sticky-prog { position:sticky; top:calc(env(safe-area-inset-top) + 60px); z-index:20; background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:11px 13px; box-shadow:var(--shadow); margin-bottom:14px; }
  .sticky-prog .row { display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-soft); margin-bottom:7px; }

  /* ---- Results ---- */
  .rcard { border-radius:18px; padding:18px; border:1px solid; }
  .rcard.good { background:var(--good-bg); border-color:var(--good-bd); }
  .rcard.warn { background:var(--warn-bg); border-color:var(--warn-bd); }
  .rcard.bad  { background:var(--bad-bg);  border-color:var(--bad-bd); }
  .rcard .top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px; }
  .rcard .top b { font-size:14px; color:var(--text); }
  .tlabel.good { color:var(--good); } .tlabel.warn { color:var(--warn); } .tlabel.bad { color:var(--bad); }
  .tlabel { font-weight:680; font-size:14px; }
  .bar { height:9px; background:color-mix(in srgb,var(--surface) 60%, transparent); border-radius:99px; overflow:hidden; }
  .bar > i { display:block; height:100%; border-radius:99px; transition:width .6s cubic-bezier(.4,0,.2,1); }
  .bar > i.good { background:var(--good); } .bar > i.warn { background:var(--warn); } .bar > i.bad { background:var(--bad); }
  .fwrow { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; box-shadow:var(--shadow); }
  .fwrow .top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:9px; }
  .fwrow .top b { font-size:13.5px; }
  .fwrow .top small { display:block; color:var(--text-faint); font-size:11.5px; }

  /* ---- Mechanism / list cards ---- */
  .mcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:15px; box-shadow:var(--shadow); }
  .mcard + .mcard { margin-top:10px; }
  .mcard .mh { display:flex; align-items:center; gap:9px; margin-bottom:7px; }
  .mcard .mh b { font-size:14px; font-weight:630; }
  .mcard p { margin:0; font-size:13.5px; color:var(--text-soft); line-height:1.6; }
  .num { width:25px; height:25px; border-radius:50%; background:var(--accent); color:#fff; display:grid; place-items:center; font-size:12px; font-weight:650; flex:none; }
  html[data-theme="dark"] .num { color:#04211d; }

  /* ---- Ladder ---- */
  .ladder { position:relative; padding-left:30px; }
  .ladder:before { content:""; position:absolute; left:11px; top:6px; bottom:6px; width:2px; background:var(--border); }
  .lstep { position:relative; margin-bottom:12px; }
  .lstep .dot { position:absolute; left:-30px; top:2px; width:24px; height:24px; border-radius:50%; background:var(--accent); color:#fff; display:grid; place-items:center; font-size:11px; font-weight:650; }
  html[data-theme="dark"] .lstep .dot { color:#04211d; }

  /* ---- Document ---- */
  .field { margin-bottom:11px; }
  .field label { display:block; font-size:11.5px; font-weight:600; color:var(--text-soft); margin-bottom:5px; }
  .field input, .field textarea {
    width:100%; padding:10px 12px; border-radius:11px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); outline:none; transition:border .15s;
  }
  .field input:focus, .field textarea:focus { border-color:var(--accent); }
  .field textarea { resize:none; }
  .entry { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; box-shadow:var(--shadow); }
  .entry + .entry { margin-top:10px; }
  .entry .eh { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
  .entry .eh .d { font-size:11.5px; font-weight:640; color:var(--accent-ink); }
  .entry .what { font-size:13.5px; margin:0 0 8px; }
  .entry dl { margin:0; font-size:11.5px; color:var(--text-soft); display:grid; gap:3px; }
  .entry dl b { color:var(--text); font-weight:600; }
  .empty { text-align:center; padding:42px 0; color:var(--text-faint); }
  .empty p { margin:8px 0 0; font-size:13.5px; }

  /* ---- Support ---- */
  .scard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:15px; box-shadow:var(--shadow); }
  .scard + .scard { margin-top:10px; }
  .scard .sh { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
  .scard .sh b { font-size:14px; font-weight:630; }
  .scard p { margin:5px 0 9px; font-size:13px; color:var(--text-soft); line-height:1.55; }
  .scard .meta { display:flex; flex-wrap:wrap; gap:6px 16px; align-items:center; }
  .scard .meta a { display:flex; align-items:center; gap:6px; font-weight:620; font-size:14px; text-decoration:none; }
  .scard .meta small { color:var(--text-faint); font-size:11.5px; }

  /* ---- Bottom nav ---- */
  .nav {
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    display:flex; justify-content:center;
    padding-bottom:env(safe-area-inset-bottom);
    background:color-mix(in srgb, var(--bg) 84%, transparent);
    backdrop-filter:saturate(160%) blur(14px); -webkit-backdrop-filter:saturate(160%) blur(14px);
    border-top:1px solid color-mix(in srgb, var(--border) 70%, transparent);
  }
  .nav-inner { display:flex; width:100%; max-width:560px; height:var(--nav-h); }
  .nav button {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    color:var(--text-faint); font-size:10.5px; font-weight:560; transition:color .15s;
  }
  .nav button .ni { transition:transform .2s; }
  .nav button.on { color:var(--accent-ink); }
  .nav button.on .ni { transform:translateY(-1px); }
  .nav button:active .ni { transform:scale(.85); }

  /* ---- Banners ---- */
  .banner {
    position:fixed; left:12px; right:12px; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px);
    max-width:536px; margin:0 auto; z-index:60;
    background:var(--surface); border:1px solid var(--border-strong); border-radius:16px;
    box-shadow:var(--shadow-lg); padding:13px 14px;
    display:flex; align-items:center; gap:11px; animation:rise .35s ease;
  }
  @keyframes rise { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .banner .bt b { font-size:13.5px; font-weight:640; display:block; }
  .banner .bt small { font-size:12px; color:var(--text-soft); }
  .banner .sp { flex:1; }

  .offline {
    position:fixed; top:calc(env(safe-area-inset-top) + 8px); left:50%; transform:translateX(-50%);
    z-index:70; background:var(--text); color:var(--bg); font-size:12px; font-weight:600;
    padding:7px 14px; border-radius:99px; box-shadow:var(--shadow-lg);
    display:none; align-items:center; gap:7px;
  }
  .offline.show { display:flex; animation:rise .3s ease; }
  .dot-live { width:7px; height:7px; border-radius:50%; background:var(--warn); }

  .toast {
    position:fixed; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px); left:50%; transform:translateX(-50%) translateY(20px);
    z-index:80; background:var(--text); color:var(--bg); font-size:13px; font-weight:600;
    padding:10px 18px; border-radius:99px; box-shadow:var(--shadow-lg); opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s; display:flex; align-items:center; gap:8px;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .foot { font-size:11px; color:var(--text-faint); line-height:1.55; border-top:1px solid var(--border); margin-top:24px; padding-top:14px; }
</style>

<div class="app">
  <div class="topbar">
    <div class="logo" id="logo"></div>
    <div class="brand">
      <h1>Clear Ground</h1>
      <p>Psychological safety at work · UK</p>
    </div>
    <div class="sp"></div>
    <button class="iconbtn" id="installBtn" title="Install app" style="display:none"></button>
    <button class="iconbtn" id="themeBtn" title="Toggle theme"></button>
  </div>

  <main id="view"></main>

  <nav class="nav"><div class="nav-inner" id="nav"></div></nav>
</div>

<div class="offline" id="offline"><span class="dot-live"></span> Offline — your data is safe</div>
<div class="toast" id="toast"></div>

/* ============ HELPERS ============ */
function concern(it,v){ return it.t==="neg" ? v : 4-v; }
function tier(p){ if(p<=33) return {k:"good",l:"Healthy",n:"Mostly healthy signals here."}; if(p<=66) return {k:"warn",l:"Some concern",n:"A mixed picture worth watching."}; return {k:"bad",l:"Significant concern",n:"Strong signals of an unhealthy environment."}; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ============ STORAGE (adaptive) ============ */
let BACKEND="memory"; const MEM={};
async function detectBackend(){
  try{ if(window.storage && window.storage.set){ await window.storage.set("__cg__","1"); BACKEND="claude"; return; } }catch(e){}
  try{ localStorage.setItem("__cg__","1"); localStorage.removeItem("__cg__"); BACKEND="local"; return; }catch(e){}
  BACKEND="memory";
}
const Store={
  async get(k){
    if(BACKEND==="claude"){ try{ const r=await window.storage.get(k); return r?r.value:null; }catch(e){ return null; } }
    if(BACKEND==="local"){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
    return MEM[k]??null;
  },
  async set(k,v){
    if(BACKEND==="claude"){ try{ await window.storage.set(k,v); return true; }catch(e){ return false; } }
    if(BACKEND==="local"){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }
    MEM[k]=v; return true;
  }
};

  else if(S.tab==="learn") html=vLearn();
  else if(S.tab==="log") html=vLog();
  else if(S.tab==="act") html=vAct();
  html += `<div class="foot">Clear Ground is an educational tool, not legal advice or a substitute for Acas, a solicitor, a union, or a medical professional. For anything you intend to act on, get tailored advice. In a crisis, call Samaritans on 116&nbsp;123 (24/7) or 999.</div>`;
  v.innerHTML=html;
  window.scrollTo({top:0,behavior:"instant"});
  wire();
  renderNav();
}

function go(tab,sub){
  S.tab=tab;
  if(tab==="learn" && sub) S.learn=sub;
  if(tab==="act" && sub) S.act=sub;
  render();
}

/* ============ WIRING ============ */
function wire(){
  document.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>go(el.dataset.go, el.dataset.sub));
  document.querySelectorAll("[data-learn]").forEach(el=>el.onclick=()=>{ S.learn=el.dataset.learn; render(); });
  document.querySelectorAll("[data-act]").forEach(el=>el.onclick=()=>{ S.act=el.dataset.act; render(); });

  // assessment
  document.querySelectorAll("[data-item]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.item, val=+b.dataset.val;
    S.answers[id]=val;
    document.querySelectorAll(`[data-item="${id}"]`).forEach(x=>x.classList.toggle("on", +x.dataset.val===val));
    const done=Object.keys(S.answers).length, total=ITEMS.length, pct=Math.round(done/total*100);
    const pb=document.getElementById("pgB"); if(pb) pb.style.width=pct+"%";
    const pt=document.getElementById("pgT"); if(pt) pt.textContent=`${done} of ${total} answered`;
    const pp=document.getElementById("pgP"); if(pp) pp.textContent=pct+"%";
    const sb=document.getElementById("submitBtn"); if(sb){ sb.disabled=done<total; sb.textContent=done<total?`Answer all ${total} to see results`:"See my results"; }
  });
  const sb=document.getElementById("submitBtn"); if(sb) sb.onclick=()=>{ if(Object.keys(S.answers).length===ITEMS.length){ S.submitted=true; render(); } };
  const rb=document.getElementById("retakeBtn"); if(rb) rb.onclick=()=>{ S.answers={}; S.submitted=false; render(); };

  // log
  const ab=document.getElementById("addBtn"); if(ab) ab.onclick=()=>{ S.formOpen=!S.formOpen; render(); };
  const cb=document.getElementById("cancelBtn"); if(cb) cb.onclick=()=>{ S.formOpen=false; render(); };
  const save=document.getElementById("saveBtn"); if(save) save.onclick=saveEntry;
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>delEntry(+b.dataset.del));
  const cp=document.getElementById("copyBtn"); if(cp) cp.onclick=copyLog;
}

async function saveEntry(){
  const what=document.getElementById("f_what").value.trim();
  if(!what){ toast("Add what happened first"); return; }
  const entry={ id:Date.now(), date:document.getElementById("f_date").value,
    what, who:document.getElementById("f_who").value.trim(),
    witnesses:document.getElementById("f_wit").value.trim(),
    impact:document.getElementById("f_imp").value.trim() };
  S.entries.unshift(entry); S.formOpen=false;
  await Store.set("cg_entries", JSON.stringify(S.entries));
  render(); toast("Saved");
}
async function delEntry(id){
  S.entries=S.entries.filter(e=>e.id!==id);
  await Store.set("cg_entries", JSON.stringify(S.entries));
  render();
}
async function copyLog(){
  const text=S.entries.slice().reverse().map((e,i)=>`Incident ${i+1}\nDate: ${e.date||"—"}\nWhat happened: ${e.what}\nWho was involved: ${e.who||"—"}\nWitnesses: ${e.witnesses||"—"}\nImpact on me: ${e.impact||"—"}\n`).join("\n----------------------------------------\n\n");
  try{ await navigator.clipboard.writeText(text||"No entries yet."); toast("Log copied"); }
  catch(e){ toast("Couldn't copy"); }
}

/* ============ TOAST ============ */
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");
  t.innerHTML=ic("check",16)+`<span>${msg}</span>`;
  t.classList.add("show"); clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

/* ============ THEME ============ */
function applyTheme(){
  const btn=document.getElementById("themeBtn");
  const dark = S.theme ? S.theme==="dark" : matchMedia("(prefers-color-scheme: dark)").matches;
  if(S.theme) document.documentElement.setAttribute("data-theme",S.theme);
  else document.documentElement.removeAttribute("data-theme");
  btn.innerHTML=ic(dark?"sun":"moon",19);
  document.querySelector('meta[name="theme-color"]').setAttribute("content", dark? "#0e1513":"#0f766e");
}
document.getElementById("themeBtn").onclick=async()=>{
  const dark = S.theme ? S.theme==="dark" : matchMedia("(prefers-color-scheme: dark)").matches;
  S.theme = dark? "light":"dark";
  await Store.set("cg_theme", S.theme); applyTheme();
};

/* ============ PWA ============ */
function setupPWA(){
  // inline manifest + icon
  const icon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#0f766e"/><circle cx="256" cy="256" r="150" fill="none" stroke="#eafdfb" stroke-width="22"/><polygon points="330 182 286 286 182 330 226 226" fill="#eafdfb"/></svg>`;
  const iconUri = "data:image/svg+xml;base64,"+btoa(icon);
  const manifest = { name:"Clear Ground", short_name:"Clear Ground",
    description:"Identify, mitigate and escalate unsafe or toxic workplaces — UK.",
    start_url:".", scope:".", display:"standalone", orientation:"portrait",
    background_color:"#f4f3ef", theme_color:"#0f766e",
    icons:[{src:iconUri, sizes:"512x512", type:"image/svg+xml", purpose:"any maskable"}] };
  const ml=document.createElement("link"); ml.rel="manifest";
  ml.href="data:application/manifest+json;base64,"+btoa(unescape(encodeURIComponent(JSON.stringify(manifest))));
  document.head.appendChild(ml);
  const al=document.createElement("link"); al.rel="apple-touch-icon"; al.href=iconUri; document.head.appendChild(al);
  document.getElementById("logo").innerHTML=ic("compass",19,2.2);

  // service worker (works when deployed with a sibling sw.js; silently no-ops here)
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }

  // install prompt
  let deferred;
  const ib=document.getElementById("installBtn");
  ib.innerHTML=ic("download",18);
  window.addEventListener("beforeinstallprompt",(e)=>{ e.preventDefault(); deferred=e; ib.style.display="grid"; });
  ib.onclick=async()=>{ if(!deferred) return; deferred.prompt(); await deferred.userChoice; deferred=null; ib.style.display="none"; };
  window.addEventListener("appinstalled",()=>{ ib.style.display="none"; toast("App installed"); });

  // online / offline
  const off=document.getElementById("offline");
  const upd=()=>off.classList.toggle("show", !navigator.onLine);
  window.addEventListener("online",upd); window.addEventListener("offline",upd); upd();
}

/* ============ INIT ============ */
(async function init(){
  await detectBackend();
  const t=await Store.get("cg_theme"); if(t) S.theme=t;
  applyTheme();
  const raw=await Store.get("cg_entries"); if(raw){ try{ S.entries=JSON.parse(raw)||[]; }catch(e){} }
  setupPWA();
  render();
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{ if(!S.theme) applyTheme(); });
})();
</script>
