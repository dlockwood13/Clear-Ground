<title>Clear Ground</title>

<style>

  @media (prefers-color-scheme: dark) { html:not([data-theme]) {
    --bg:#0e1513; --surface:#16211e; --surface-2:#1a2623; --surface-3:#202d29;
    --border:#283531; --border-strong:#33433e;

  .chip-i { width:30px; height:30px; border-radius:9px; background:var(--accent-soft); color:var(--accent-ink); display:grid; place-items:center; flex:none; }

  .bar > i.good { background:var(--good); } .bar > i.warn { background:var(--warn); } .bar > i.bad { background:var(--bad); }

  .num { width:25px; height:25px; border-radius:50%; background:var(--accent); color:#fff; display:grid; place-items:center; font-size:12px; font-weight:650; flex:none; }

  .field input:focus, .field textarea:focus { border-color:var(--accent); }

  .entry { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; box-shadow:var(--shadow); }

  .empty { text-align:center; padding:42px 0; color:var(--text-faint); }
  .empty p { margin:8px 0 0; font-size:13.5px; }

  .checkrow { display:flex; gap:11px; align-items:flex-start; background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:12px 13px; box-shadow:var(--shadow); }

  .checkrow .cx b { font-size:12px; color:var(--accent-ink); display:block; }

  .output { white-space:pre-wrap; font-size:13px; line-height:1.6; background:var(--surface-2); border:1px solid var(--border); border-radius:14px; padding:15px; color:var(--text); }

  .nav-inner { display:flex; width:100%; max-width:560px; height:var(--nav-h); }
  .nav button { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--text-faint); font-size:10.5px; font-weight:560; transition:color .15s; }
  .nav button .ni { transition:transform .2s; }
  .nav button.on { color:var(--accent-ink); }

  .banner { position:fixed; left:12px; right:12px; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px); max-width:536px; margin:0 auto; z-index:60;

  .offline { position:fixed; top:calc(env(safe-area-inset-top) + 8px); left:50%; transform:translateX(-50%); z-index:70; background:var(--text); color:var(--bg); font-size:12px; font-weight:600; padding:7px 14px; border-radius:99px; box-shadow:var(--shadow-lg); display:none; align-items:center; gap:7px; }

  .toast { position:fixed; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px); left:50%; transform:translateX(-50%) translateY(20px); z-index:80; background:var(--text); color:var(--bg); font-size:13px; font-weight:600; padding:10px 18px; border-radius:99px; box-shadow:var(--shadow-lg); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; display:flex; align-items:center; gap:8px; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .overlay { position:fixed; inset:0; z-index:100; background:color-mix(in srgb, var(--bg) 92%, transparent); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:none; overflow:auto; padding:calc(env(safe-area-inset-top) + 20px) 18px calc(env(safe-area-inset-bottom) + 20px); }
  .overlay.show { display:block; animation:fade .3s ease; }
  .ob { max-width:524px; margin:0 auto; }
  .ob .obh { text-align:center; margin-bottom:22px; }
  .ob .obh .lg { width:52px; height:52px; border-radius:16px; margin:0 auto 14px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:grid; place-items:center; color:#fff; box-shadow:var(--shadow-lg); }
  html[data-theme="dark"] .ob .obh .lg { color:#04211d; }
  .ob h2 { font-size:21px; font-weight:700; margin:0 0 6px; letter-spacing:-.02em; }
  .ob .obh p { font-size:13.5px; color:var(--text-soft); margin:0; }
  .qlabel { font-size:13px; font-weight:640; margin:18px 0 9px; }
  .choices { display:grid; gap:9px; }
  .choice { text-align:left; background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:14px; transition:all .15s; }
  .choice:active { transform:scale(.98); }
  .choice.on { border-color:var(--accent); background:var(--accent-soft); }
  .choice b { font-size:14px; font-weight:630; display:block; }

  .foot { font-size:11px; color:var(--text-faint); line-height:1.55; border-top:1px solid var(--border); margin-top:24px; padding-top:14px; }

let BACKEND="memory"; const MEM={};
async function detectBackend(){
  try{ if(window.storage && window.storage.set){ await window.storage.set("__cg__","1"); BACKEND="claude"; return; } }catch(e){}
  try{ localStorage.setItem("__cg__","1"); localStorage.removeItem("__cg__"); BACKEND="local"; return; }catch(e){}
  BACKEND="memory";
}
const Store={
  async get(k){
    if(BACKEND==="claude"){ try{ const r=await window.storage.get(k); return r?r.value:null; }catch(e){ return null; } }
    if(BACKEND==="local"){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
    return MEM[k]??null;
  },
  async set(k,v){
    if(BACKEND==="claude"){ try{ await window.storage.set(k,v); return true; }catch(e){ return false; } }
    if(BACKEND==="local"){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }
    MEM[k]=v; return true;
  }
};

  entries:[], formOpen:false,
  profile:{region:null,status:null,onboarded:false},
  onb:{region:null,status:null},
  prep:{open:false, type:"informal", sel:{}, output:null} };

/* ============ NAV ============ */
const TABS=[
  {id:"home",label:"Home",icon:"compass"},{id:"check",label:"Check",icon:"clip"},
  {id:"learn",label:"Learn",icon:"book"},{id:"log",label:"Log",icon:"file"},{id:"act",label:"Act",icon:"buoy"}
];
function renderNav(){
  document.getElementById("nav").innerHTML = TABS.map(t=>`<button data-tab="${t.id}" class="${S.tab===t.id?"on":""}"><span class="ni">${ic(t.icon,22,2.1)}</span>${t.label}</button>`).join("");
  document.querySelectorAll("#nav [data-tab]").forEach(b=>b.onclick=()=>go(b.dataset.tab));
}

/* ============ VIEWS ============ */
function profilePill(){
  if(!S.profile.onboarded || (!S.profile.status && !S.profile.region)) return "";
  const bits=[]; if(S.profile.status&&S.profile.status!=="notsure") bits.push(STATUS_LABEL[S.profile.status]); if(S.profile.region) bits.push(REGION_LABEL[S.profile.region]);
  if(!bits.length) return "";
  return `<div class="pillrow"><span class="pill">${ic("user",14)} Tailored for <b>${bits.join(" · ")}</b></span><button id="editProfile">Change</button></div>`;
}
function vHome(){
  const tiles=[
    {id:"check",icon:"clip",t:"Identify",d:"An evidence-based self-check across three frameworks."},
    {id:"learn",icon:"book",t:"Understand",d:"The psychology behind it — and why it isn't your fault."},
    {id:"learn",icon:"shield",t:"Mitigate",d:"Realistic ways to protect yourself and your options.",sub:"mitigate"},
    {id:"log",icon:"file",t:"Document",d:"A private log + a conversation-script generator."},
    {id:"act",icon:"scale",t:"Escalate",d:"A UK escalation ladder tailored to your status & region."},
    {id:"act",icon:"buoy",t:"Support",d:"Trusted helplines for where you work.",sub:"support"}
  ];
  return `<div class="view">
    <div class="hero"><h2>Something feels wrong here.</h2><p>Move from a vague unease to a clear picture: what's happening, what you can do, and how to raise it safely.</p></div>
    ${profilePill()}
    <div class="grid">${tiles.map(c=>`<button class="tile" data-go="${c.id}" ${c.sub?`data-sub="${c.sub}"`:""}><span class="tt"><span class="chip-i">${ic(c.icon,17,2)}</span><b>${c.t}</b></span><small>${c.d}</small></button>`).join("")}</div>
    <div class="note info" style="margin-top:14px">${ic("lock",16)}<span>Anything in the Log is stored privately on this device, not shared with anyone. Even so, avoid recording anything highly sensitive.</span></div>
  </div>`;
}

function vCheck(){
  if(S.submitted) return vResults();
  const done=Object.keys(S.answers).length, total=ITEMS.length, pct=Math.round(done/total*100);
  const groups=Object.keys(FW).map(fw=>`
    <div class="fwhead"><b>${FW[fw].name}</b><small>${FW[fw].src}</small></div>
    ${ITEMS.filter(i=>i.fw===fw).map(it=>`<div class="qcard"><p class="qtext">${it.x}</p><div class="scale">${SCALE.map((l,v)=>`<button data-item="${it.id}" data-val="${v}" class="${S.answers[it.id]===v?"on":""}">${l}</button>`).join("")}</div></div>`).join("")}`).join("");
  return `<div class="view"><h2 class="h2">Identify</h2><p class="sub">A self-check grounded in established frameworks. Answer for your current workplace.</p>
    <div class="sticky-prog"><div class="row"><span id="pgT">${done} of ${total} answered</span><span id="pgP">${pct}%</span></div><div class="prog"><i id="pgB" style="width:${pct}%"></i></div></div>
    ${groups}
    <div style="margin-top:16px"><button class="btn" id="submitBtn" ${done<total?"disabled":""}>${done<total?`Answer all ${total} to see results`:"See my results"}</button></div></div>`;
}
function vResults(){
  const per=Object.keys(FW).map(fw=>{ const items=ITEMS.filter(i=>i.fw===fw); const sum=items.reduce((a,i)=>a+concern(i,S.answers[i.id]),0); const pct=Math.round(sum/(items.length*4)*100); return {fw,pct,...FW[fw],T:tier(pct)}; });
  const overall=Math.round(per.reduce((a,f)=>a+f.pct,0)/per.length); const OT=tier(overall);
  return `<div class="view"><h2 class="h2">Your picture</h2><p class="sub">A snapshot, not a diagnosis. Use it to focus where it matters.</p>
    <div class="rcard ${OT.k}"><div class="top"><b>Overall</b><span class="tlabel ${OT.k}">${OT.l}</span></div><div class="bar"><i class="${OT.k}" style="width:${overall}%"></i></div><p style="margin:9px 0 0;font-size:13px;color:var(--text-soft)">${OT.n}${overall>33?" The breakdown below shows where to look first.":""}</p></div>
    <div class="stack" style="margin-top:12px">${per.map(f=>`<div class="fwrow"><div class="top"><span><b>${f.name}</b><small>${f.short}</small></span><span class="tlabel ${f.T.k}">${f.T.l}</span></div><div class="bar"><i class="${f.T.k}" style="width:${f.pct}%"></i></div></div>`).join("")}</div>
    <div class="card" style="margin-top:14px;background:var(--accent-soft);border-color:var(--accent-soft)"><b style="font-size:13.5px;color:var(--accent-ink)">Suggested next steps</b><div class="stack" style="margin-top:8px;font-size:13.5px">
      <div style="display:flex;gap:7px"><span style="color:var(--accent-ink)">${ic("chev",16)}</span>Read <a data-go="learn">Understand</a> to make sense of what's driving this.</div>
      <div style="display:flex;gap:7px"><span style="color:var(--accent-ink)">${ic("chev",16)}</span>Start a private record in <a data-go="log">Log</a> while it's fresh.</div>
      ${overall>33?`<div style="display:flex;gap:7px"><span style="color:var(--accent-ink)">${ic("chev",16)}</span>Review your options in <a data-go="act">Act</a>.</div>`:""}</div></div>
    <div style="margin-top:14px"><button class="btn ghost sm" id="retakeBtn">Retake the check</button></div></div>`;
}

function vLearn(){
  const sub=S.learn;
  const content = sub==="understand" ? MECH.map(m=>`<div class="mcard"><div class="mh"><span class="chip-i">${ic(m.i,17,2)}</span><b>${m.h}</b></div><p>${m.p}</p></div>`).join("")
    : MIT.map((m,i)=>`<div class="mcard"><div class="mh"><span class="num">${i+1}</span><b>${m.h}</b></div><p>${m.p}</p></div>`).join("");
  return `<div class="view"><h2 class="h2">Learn</h2><p class="sub">${sub==="understand"?"Toxic environments run on predictable mechanisms. Naming them removes some of their power — and a lot of the self-blame.":"You can't fix a culture alone, but you can protect yourself and keep your options open."}</p>
    <div class="seg"><button data-learn="understand" class="${sub==="understand"?"on":""}">Why it happens</button><button data-learn="mitigate" class="${sub==="mitigate"?"on":""}">What you can do</button></div>
    ${content}${sub==="mitigate"?`<div style="margin-top:14px"><button class="btn" data-go="log">${ic("file",18)} Start documenting</button></div>`:""}</div>`;
}

/* ----- LOG + conversation generator ----- */
function vLog(){
  if(S.prep.open) return vPrep();
  const list = S.entries.length===0
    ? `<div class="empty">${ic("file",30)}<p>No entries yet. Your log will appear here.</p></div>`
    : S.entries.map(e=>`<div class="entry"><div class="eh"><span class="d">${esc(e.date)||"Undated"}</span><button class="iconbtn" style="width:30px;height:30px;border:none;background:transparent;color:var(--text-faint)" data-del="${e.id}">${ic("trash",16)}</button></div><p class="what">${esc(e.what)}</p><dl>${e.who?`<div><b>Involved:</b> ${esc(e.who)}</div>`:""}${e.witnesses?`<div><b>Witnesses:</b> ${esc(e.witnesses)}</div>`:""}${e.impact?`<div><b>Impact:</b> ${esc(e.impact)}</div>`:""}</dl></div>`).join("");
  const form = S.formOpen ? `<div class="card" style="border-color:var(--accent);margin-bottom:14px">
      <div class="field"><label>Date</label><input type="date" id="f_date"></div>
      <div class="field"><label>What happened</label><textarea id="f_what" rows="3" placeholder="Describe it factually…"></textarea></div>
      <div class="field"><label>Who was involved</label><input id="f_who" placeholder="Names / roles"></div>
      <div class="field"><label>Witnesses</label><input id="f_wit" placeholder="Anyone who saw or heard it"></div>
      <div class="field"><label>Impact on me</label><textarea id="f_imp" rows="2" placeholder="e.g. couldn't sleep, lost confidence"></textarea></div>
      <div style="display:flex;gap:8px"><button class="btn sm" id="saveBtn">Save entry</button><button class="btn ghost sm" id="cancelBtn" style="width:auto;padding-left:18px;padding-right:18px">Cancel</button></div></div>` : "";
  return `<div class="view"><h2 class="h2">Log</h2><p class="sub">A contemporaneous record carries far more weight than memory later. Specific, dated, factual notes.</p>
    <div class="note info" style="margin-bottom:14px">${ic("lock",16)}<span>Stored privately on this device. Record facts, not confidential company files.</span></div>
    <div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn sm" id="addBtn">${ic("plus",17)} Add incident</button><button class="btn ghost sm" id="copyBtn" style="width:auto;padding-left:16px;padding-right:16px" ${S.entries.length===0?"disabled":""}>${ic("copy",16)} Copy log</button></div>
    <button class="btn ghost sm" id="prepBtn" style="margin-bottom:14px" ${S.entries.length===0?"disabled":""}>${ic("chat",17)} Prepare a conversation</button>
    ${form}${list}</div>`;
}
function vPrep(){
  const type=S.prep.type;
  if(S.prep.output!=null){
    return `<div class="view"><button class="btn ghost sm" id="prepBack" style="width:auto;padding-left:14px;padding-right:16px;margin-bottom:14px">${ic("back",16)} Back</button>
      <h2 class="h2">Your draft</h2><p class="sub">A calm, factual starting point. Edit anything in [brackets] and adapt the wording to sound like you.</p>
      <div class="output" id="outBox">${esc(S.prep.output)}</div>
      <div style="margin-top:14px"><button class="btn" id="copyOut">${ic("copy",17)} Copy draft</button></div></div>`;
  }
  const rows=S.entries.map(e=>{ const on=S.prep.sel[e.id]; return `<button class="checkrow ${on?"on":""}" data-pick="${e.id}"><span class="box">${on?ic("check",14):""}</span><span class="cx"><b>${esc(e.date)||"Undated"}</b><p>${esc(e.what)}</p></span></button>`; }).join("");
  const count=Object.values(S.prep.sel).filter(Boolean).length;
  return `<div class="view"><button class="btn ghost sm" id="prepBack" style="width:auto;padding-left:14px;padding-right:16px;margin-bottom:14px">${ic("back",16)} Back</button>
    <h2 class="h2">Prepare a conversation</h2><p class="sub">Turn your log into a calm, factual script. Choose the tone and which incidents to include.</p>
    <div class="seg"><button data-ptype="informal" class="${type==="informal"?"on":""}">Informal chat</button><button data-ptype="grievance" class="${type==="grievance"?"on":""}">Formal grievance</button></div>
    <p style="font-size:12px;color:var(--text-faint);margin:0 0 10px">Include these incidents:</p>
    ${rows}
    <div style="margin-top:14px"><button class="btn" id="genBtn" ${count===0?"disabled":""}>${ic("chat",17)} Generate ${type==="informal"?"script":"grievance"}</button></div></div>`;
}
function generate(){
  const chosen=S.entries.filter(e=>S.prep.sel[e.id]);
  if(!chosen.length) return;
  const ordered=chosen.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const impacts=ordered.map(e=>e.impact&&e.impact.trim()).filter(Boolean);
  const conciliator = region()==="ni" ? "LRA" : "Acas";
  let out;
  if(S.prep.type==="informal"){
    const lines=ordered.map(e=>`• On ${fmtDate(e.date)}, ${e.what.trim().replace(/\.$/,"")}.${e.impact?` This affected me by: ${e.impact.trim().replace(/\.$/,"")}.`:""}`).join("\n");
    out=`Hi [name],

I'd like to find a time to talk through a few things that have been affecting how I'm able to work. I'm raising them because I genuinely want to find a way forward, not to point fingers.

A few specific examples:
${lines}

Taken together this has started to take a real toll on me, and I'd value the chance to talk about how we can change things.

Would you be open to a conversation this week?

Thanks,
[Your name]`;
  } else {
    const body=ordered.map((e,i)=>{ let s=`${i+1}. On ${fmtDate(e.date)}, ${e.what.trim().replace(/\.$/,"")}.`; if(e.who) s+=` Those involved: ${e.who.trim()}.`; if(e.witnesses) s+=` Witnessed by: ${e.witnesses.trim()}.`; return s; }).join("\n");
    const impactBlock = impacts.length ? `These events have affected me in the following ways:\n${impacts.map(i=>`• ${i.trim().replace(/\.$/,"")}`).join("\n")}` : "These events have had a cumulative impact on my wellbeing and my ability to do my job.";
    const accomp = (S.profile.status==="employee"||S.profile.status==="worker") ? "\n\nI understand I have the right to be accompanied at any grievance meeting by a colleague or trade union representative." : "";
    out=`FORMAL GRIEVANCE

To: [manager / HR]
From: [your name]
Date: ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}

I am writing to raise a formal grievance about conduct at work that is affecting my wellbeing and my ability to do my job. I would like this to be dealt with under the company's grievance procedure and the ${conciliator} Code of Practice.

Summary of what has happened:
${body}

The impact on me:
${impactBlock}

What I would like to happen:
[Set out the outcome you are seeking — for example, the behaviour to stop, an apology, a change to arrangements, or a formal investigation.]${accomp}

I would be grateful if we could arrange a meeting to discuss this grievance.

Yours sincerely,
[Your name]`;
  }
  S.prep.output=out; render();
}

/* ----- ACT (escalate + support), tailored ----- */
function vAct(){
  if(S.act==="support") return vSupport();
  const r=region(); const laws = r==="ni"?LAWS_NI:LAWS_GB; const ladder=[...LADDER_BASE,...LADDER_TAIL[r]];
  const st=S.profile.status||"notsure";
  const rightsCard = (st!=="notsure" && RIGHTS[st]) ? `<div class="card" style="margin-bottom:14px"><div class="mh" style="display:flex;align-items:center;gap:9px;margin-bottom:6px"><span class="chip-i">${ic("user",17,2)}</span><b style="font-size:14px;font-weight:640">Your rights at a glance — ${STATUS_LABEL[st]}</b></div><ul class="rights">${RIGHTS[st].map(x=>`<li>${x}</li>`).join("")}</ul></div>` : "";
  return `<div class="view"><h2 class="h2">Act</h2><p class="sub">A ${r==="ni"?"Northern Ireland":"UK"} escalation ladder, tailored to your situation.</p>
    <div class="seg"><button data-act="escalate" class="on">Escalate</button><button data-act="support">Get help</button></div>
    ${rightsCard}
    <div class="note info" style="margin-bottom:14px">${ic("user",16)}<span>${STATUS_NOTE[st]} ${(!S.profile.onboarded||st==="notsure")?'<button id="editProfile" style="color:var(--accent-ink);font-weight:600">Personalise this →</button>':''}</span></div>
    <div class="note warn" style="margin-bottom:16px">${ic("alert",18)}<span><b>Key nuance:</b> ${NUANCE[r]} Get advice on how your situation fits.</span></div>
    <div class="ladder">${ladder.map(s=>`<div class="lstep"><span class="dot">${s.n}</span><div class="mcard"><div class="mh"><b>${s.h}</b></div><p>${s.p}</p></div></div>`).join("")}</div>
    <h3 style="font-size:14.5px;font-weight:640;margin:18px 0 10px">The law in the background</h3>
    ${laws.map(l=>`<div class="mcard"><div class="mh"><span class="chip-i">${ic("scale",16,2)}</span><b>${l.h}</b></div><p>${l.p}</p></div>`).join("")}
    <div class="note bad" style="margin-top:14px">${ic("alert",18)}<span><b>Watch the clock.</b> ${CLOCK[r]}</span></div></div>`;
}
function vSupport(){
  const r=region(); const list=r==="ni"?SUP_NI:SUP_GB;
  const crisis = r==="ni"
    ? `Samaritans are free, 24/7, on <a href="tel:116123" style="color:inherit;font-weight:700">116 123</a>. In NI you can also call Lifeline, the 24/7 crisis service, on <a href="tel:08088088000" style="color:inherit;font-weight:700">0808 808 8000</a>. In an emergency, call 999.`
    : `Samaritans are free, 24/7, on <a href="tel:116123" style="color:inherit;font-weight:700">116 123</a>. For urgent out-of-hours mental-health support, call NHS 111 and choose option 2. In an emergency, call 999.`;
  return `<div class="view"><h2 class="h2">Act</h2><p class="sub">Trusted, mostly free services for ${REGION_LABEL[r]}. You don't have to work this out alone.</p>
    <div class="seg"><button data-act="escalate">Escalate</button><button data-act="support" class="on">Get help</button></div>
    <div class="note bad" style="margin-bottom:16px">${ic("heart",18)}<span><b>If you're struggling to cope right now:</b> ${crisis}</span></div>
    ${list.map(s=>`<div class="scard"><div class="sh"><b>${s.n}</b><a href="${s.u}" target="_blank" rel="noreferrer" style="color:var(--accent-ink)">${ic("ext",17)}</a></div><p>${s.d}</p><div class="meta">${s.ph?`<a href="tel:${s.ph.replace(/\s/g,'')}">${ic("phone",15)} ${s.ph}</a>`:""}${s.hr?`<small>${s.hr}</small>`:""}</div></div>`).join("")}</div>`;
}

/* ============ RENDER ============ */
function render(){
  const v=document.getElementById("view"); let html="";
  if(S.tab==="home") html=vHome();
  else if(S.tab==="check") html=vCheck();
  else if(S.tab==="learn") html=vLearn();
  else if(S.tab==="log") html=vLog();
  else if(S.tab==="act") html=vAct();
  html += `<div class="foot">Clear Ground is an educational tool, not legal advice or a substitute for ${region()==="ni"?"the LRA":"Acas"}, a solicitor, a union, or a medical professional. For anything you intend to act on, get tailored advice. In a crisis, call Samaritans on 116&nbsp;123 (24/7) or 999.</div>`;
  v.innerHTML=html; window.scrollTo({top:0,behavior:"instant"}); wire(); renderNav();
}
function go(tab,sub){ S.tab=tab; if(tab==="learn"&&sub) S.learn=sub; if(tab==="act"&&sub) S.act=sub; if(tab!=="log"){ S.prep.open=false; S.prep.output=null; } render(); }

/* ============ WIRING ============ */
function wire(){
  document.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>go(el.dataset.go, el.dataset.sub));
  document.querySelectorAll("[data-learn]").forEach(el=>el.onclick=()=>{ S.learn=el.dataset.learn; render(); });
  document.querySelectorAll("[data-act]").forEach(el=>el.onclick=()=>{ S.act=el.dataset.act; render(); });
  const ep=document.getElementById("editProfile"); if(ep) ep.onclick=openOnboarding;

  document.querySelectorAll("[data-item]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.item, val=+b.dataset.val; S.answers[id]=val;
    document.querySelectorAll(`[data-item="${id}"]`).forEach(x=>x.classList.toggle("on", +x.dataset.val===val));
    const done=Object.keys(S.answers).length, total=ITEMS.length, pct=Math.round(done/total*100);
    const pb=document.getElementById("pgB"); if(pb) pb.style.width=pct+"%";
    const pt=document.getElementById("pgT"); if(pt) pt.textContent=`${done} of ${total} answered`;
    const pp=document.getElementById("pgP"); if(pp) pp.textContent=pct+"%";
    const sb=document.getElementById("submitBtn"); if(sb){ sb.disabled=done<total; sb.textContent=done<total?`Answer all ${total} to see results`:"See my results"; }
  });
  const sb=document.getElementById("submitBtn"); if(sb) sb.onclick=()=>{ if(Object.keys(S.answers).length===ITEMS.length){ S.submitted=true; render(); } };
  const rb=document.getElementById("retakeBtn"); if(rb) rb.onclick=()=>{ S.answers={}; S.submitted=false; render(); };

  const ab=document.getElementById("addBtn"); if(ab) ab.onclick=()=>{ S.formOpen=!S.formOpen; render(); };
  const cb=document.getElementById("cancelBtn"); if(cb) cb.onclick=()=>{ S.formOpen=false; render(); };
  const save=document.getElementById("saveBtn"); if(save) save.onclick=saveEntry;
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>delEntry(+b.dataset.del));
  const cp=document.getElementById("copyBtn"); if(cp) cp.onclick=copyLog;

  const pb=document.getElementById("prepBtn"); if(pb) pb.onclick=()=>{ S.prep.open=true; S.prep.output=null; S.prep.sel={}; S.entries.forEach(e=>S.prep.sel[e.id]=true); render(); };
  const pbk=document.getElementById("prepBack"); if(pbk) pbk.onclick=()=>{ if(S.prep.output!=null){ S.prep.output=null; render(); } else { S.prep.open=false; render(); } };
  document.querySelectorAll("[data-ptype]").forEach(b=>b.onclick=()=>{ S.prep.type=b.dataset.ptype; render(); });
  document.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>{ const id=+b.dataset.pick; S.prep.sel[id]=!S.prep.sel[id]; render(); });
  const gb=document.getElementById("genBtn"); if(gb) gb.onclick=generate;
  const co=document.getElementById("copyOut"); if(co) co.onclick=async()=>{ try{ await navigator.clipboard.writeText(S.prep.output); toast("Draft copied"); }catch(e){ toast("Couldn't copy"); } };
}

async function saveEntry(){
  const what=document.getElementById("f_what").value.trim(); if(!what){ toast("Add what happened first"); return; }
  const entry={ id:Date.now(), date:document.getElementById("f_date").value, what, who:document.getElementById("f_who").value.trim(), witnesses:document.getElementById("f_wit").value.trim(), impact:document.getElementById("f_imp").value.trim() };
  S.entries.unshift(entry); S.formOpen=false; await Store.set("cg_entries", JSON.stringify(S.entries)); render(); toast("Saved");
}
async function delEntry(id){ S.entries=S.entries.filter(e=>e.id!==id); await Store.set("cg_entries", JSON.stringify(S.entries)); render(); }
async function copyLog(){
  const text=S.entries.slice().reverse().map((e,i)=>`Incident ${i+1}\nDate: ${e.date||"—"}\nWhat happened: ${e.what}\nWho was involved: ${e.who||"—"}\nWitnesses: ${e.witnesses||"—"}\nImpact on me: ${e.impact||"—"}\n`).join("\n----------------------------------------\n\n");
  try{ await navigator.clipboard.writeText(text||"No entries yet."); toast("Log copied"); }catch(e){ toast("Couldn't copy"); }
}

/* ============ ONBOARDING ============ */
function renderOnboarding(){
  const o=document.getElementById("onb");
  const regions=[["gb","England, Wales & Scotland","Equality Act 2010 · Acas · Employment Tribunal"],["ni","Northern Ireland","Different law · LRA · Industrial Tribunal"]];
  const statuses=[["employee","Employee","Full rights incl. unfair dismissal"],["worker","Worker","Casual, agency, zero-hours, gig"],["selfemployed","Self-employed / contractor","Freelance or via your own company"],["notsure","Not sure","I'll set this later"]];
  o.innerHTML=`<div class="ob">
    <div class="obh"><div class="lg">${ic("compass",24,2.2)}</div><h2>Tailor your guidance</h2><p>Two quick questions so your rights, time limits and helplines are right for you. Optional — you can change or skip anytime.</p></div>
    <div class="qlabel">Where do you work?</div>
    <div class="choices">${regions.map(r=>`<button class="choice ${S.onb.region===r[0]?"on":""}" data-or="${r[0]}"><b>${r[1]}</b><small>${r[2]}</small></button>`).join("")}</div>
    <div class="qlabel">Your employment status</div>
    <div class="choices">${statuses.map(s=>`<button class="choice ${S.onb.status===s[0]?"on":""}" data-os="${s[0]}"><b>${s[1]}</b><small>${s[2]}</small></button>`).join("")}</div>
    <div style="margin-top:20px"><button class="btn" id="obDone">See my tailored guidance</button></div>
    <div style="margin-top:10px"><button class="btn ghost sm" id="obSkip">Skip for now</button></div>
  </div>`;
  o.querySelectorAll("[data-or]").forEach(b=>b.onclick=()=>{ S.onb.region=b.dataset.or; renderOnboarding(); });
  o.querySelectorAll("[data-os]").forEach(b=>b.onclick=()=>{ S.onb.status=b.dataset.os; renderOnboarding(); });
  document.getElementById("obDone").onclick=()=>finishOnboarding(true);
  document.getElementById("obSkip").onclick=()=>finishOnboarding(false);
}
function openOnboarding(){ S.onb={region:S.profile.region,status:S.profile.status}; renderOnboarding(); document.getElementById("onb").classList.add("show"); }
async function finishOnboarding(save){
  if(save){ S.profile.region=S.onb.region; S.profile.status=S.onb.status; }
  S.profile.onboarded=true;
  await Store.set("cg_profile", JSON.stringify(S.profile));
  document.getElementById("onb").classList.remove("show");
  render();
}

/* ============ TOAST / THEME ============ */
let toastTimer;
function toast(msg){ const t=document.getElementById("toast"); t.innerHTML=ic("check",16)+`<span>${msg}</span>`; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1800); }
function applyTheme(){
  const btn=document.getElementById("themeBtn");
  const dark = S.theme ? S.theme==="dark" : matchMedia("(prefers-color-scheme: dark)").matches;
  if(S.theme) document.documentElement.setAttribute("data-theme",S.theme); else document.documentElement.removeAttribute("data-theme");
  btn.innerHTML=ic(dark?"sun":"moon",19);
  document.querySelector('meta[name="theme-color"]').setAttribute("content", dark?"#0e1513":"#0f766e");
}
document.getElementById("themeBtn").onclick=async()=>{ const dark = S.theme ? S.theme==="dark" : matchMedia("(prefers-color-scheme: dark)").matches; S.theme = dark?"light":"dark"; await Store.set("cg_theme", S.theme); applyTheme(); };
document.getElementById("profileBtn").onclick=openOnboarding;

/* ============ PWA ============ */
function setupPWA(){
  const icon=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#0f766e"/><circle cx="256" cy="256" r="150" fill="none" stroke="#eafdfb" stroke-width="22"/><polygon points="330 182 286 286 182 330 226 226" fill="#eafdfb"/></svg>`;
  const iconUri="data:image/svg+xml;base64,"+btoa(icon);
  const manifest={ name:"Clear Ground", short_name:"Clear Ground", description:"Identify, mitigate and escalate unsafe or toxic workplaces — UK.", start_url:".", scope:".", display:"standalone", orientation:"portrait", background_color:"#f4f3ef", theme_color:"#0f766e", icons:[{src:iconUri, sizes:"512x512", type:"image/svg+xml", purpose:"any maskable"}] };
  const ml=document.createElement("link"); ml.rel="manifest"; ml.href="data:application/manifest+json;base64,"+btoa(unescape(encodeURIComponent(JSON.stringify(manifest)))); document.head.appendChild(ml);
  const al=document.createElement("link"); al.rel="apple-touch-icon"; al.href=iconUri; document.head.appendChild(al);
  document.getElementById("logo").innerHTML=ic("compass",19,2.2);
  document.getElementById("profileBtn").innerHTML=ic("user",18);
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
  let deferred; const ib=document.getElementById("installBtn"); ib.innerHTML=ic("download",18);
  window.addEventListener("beforeinstallprompt",(e)=>{ e.preventDefault(); deferred=e; ib.style.display="grid"; });
  ib.onclick=async()=>{ if(!deferred) return; deferred.prompt(); await deferred.userChoice; deferred=null; ib.style.display="none"; };
  window.addEventListener("appinstalled",()=>{ ib.style.display="none"; toast("App installed"); });
  const off=document.getElementById("offline"); const upd=()=>off.classList.toggle("show", !navigator.onLine);
  window.addEventListener("online",upd); window.addEventListener("offline",upd); upd();
}

/* ============ INIT ============ */
(async function init(){
  await detectBackend();
  const t=await Store.get("cg_theme"); if(t) S.theme=t; applyTheme();
  const raw=await Store.get("cg_entries"); if(raw){ try{ S.entries=JSON.parse(raw)||[]; }catch(e){} }
  const pr=await Store.get("cg_profile"); if(pr){ try{ Object.assign(S.profile, JSON.parse(pr)||{}); }catch(e){} }
  setupPWA(); render();
  if(!S.profile.onboarded){ S.onb={region:null,status:null}; renderOnboarding(); document.getElementById("onb").classList.add("show"); }
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{ if(!S.theme) applyTheme(); });
})();
</script>
